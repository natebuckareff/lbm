<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSLBM</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <div id="app">
      <main class="app-shell">
        <aside class="side-panel">
          <div class="side-panel-header">
            <h1>Controls</h1>
            <button
              class="panel-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="side-panel-body"
            >
              Collapse
            </button>
          </div>
          <div id="side-panel-body" class="side-panel-body">
            <p>This area is ready for navigation, controls, or status content.</p>
            <div class="control-group">
              <button class="side-button animation-toggle" type="button">Pause</button>
              <button class="side-button simulation-reset" type="button">Reset Simulation</button>
              <button class="side-button view-reset" type="button">Reset View</button>
              <label class="side-field">
                <span class="side-field-label">Grid Width</span>
                <input
                  class="side-number grid-width-input"
                  type="number"
                  min="32"
                  max="1024"
                  step="32"
                  value="128"
                >
              </label>
              <label class="side-field">
                <span class="side-field-label">Grid Height</span>
                <input
                  class="side-number grid-height-input"
                  type="number"
                  min="32"
                  max="1024"
                  step="32"
                  value="128"
                >
              </label>
              <label class="side-field">
                <span class="side-field-label">Visualize</span>
                <select class="side-select visualization-mode">
                  <option value="surface">Surface</option>
                  <option value="speed">Velocity</option>
                </select>
              </label>
              <label class="side-field">
                <span class="side-field-label">Tau</span>
                <input
                  class="side-range tau-slider"
                  type="range"
                  min="0.5"
                  max="2.0"
                  step="0.01"
                  value="0.9"
                >
                <span class="side-field-value tau-value">0.90</span>
              </label>
              <label class="side-field">
                <span class="side-field-label">Gravity</span>
                <input
                  class="side-range gravity-slider"
                  type="range"
                  min="0"
                  max="0.002"
                  step="0.00001"
                  value="0.0002"
                >
                <span class="side-field-value gravity-value">0.00020</span>
              </label>
              <label class="side-field">
                <span class="side-field-label">Rotation</span>
                <input
                  class="side-range rotation-slider"
                  type="range"
                  min="-180"
                  max="180"
                  step="1"
                  value="0"
                >
                <span class="side-field-value rotation-value">0°</span>
              </label>
              <label class="side-checkbox">
                <input class="chunk-grid-toggle" type="checkbox">
                <span>Show Chunk Grid</span>
              </label>
            </div>
          </div>
        </aside>
        <section class="content-panel">
          <div class="workspace-view" aria-label="Main workspace">
            <div class="canvas-stage">
              <canvas class="main-canvas" aria-label="Main render surface"></canvas>
            </div>
          </div>
          <section class="inspector-panel is-collapsed" aria-label="Inspector panel">
            <button
              class="inspector-bar"
              type="button"
              aria-label="Resize inspector panel"
            >
              <span class="inspector-title">Inspector</span>
            </button>
            <div class="inspector-body"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="src/app.ts"></script>
  </body>
</html>
