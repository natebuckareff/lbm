<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSLBM</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <div id="app">
      <main class="app-shell">
        <aside class="side-panel">
          <div class="side-panel-header">
            <h1>Controls</h1>
            <button
              class="panel-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="side-panel-body"
            >
              Collapse
            </button>
          </div>
          <div id="side-panel-body" class="side-panel-body">
            <p>This area is ready for navigation, controls, or status content.</p>
            <div class="control-group">
              <button class="side-button animation-toggle" type="button" data-state="running">
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path
                      class="icon-running"
                      d="M5 3h2v10H5zM9 3h2v10H9z"
                      fill="currentColor"
                    ></path>
                    <path
                      class="icon-paused"
                      d="M5 3v10l6-5-6-5z"
                      fill="currentColor"
                    ></path>
                  </svg>
                </span>
                <span class="side-button-label">Pause</span>
              </button>
              <button class="side-button simulation-step" type="button">
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path d="M4 3v10l6-5-6-5zM11 3h1v10h-1z" fill="currentColor"></path>
                  </svg>
                </span>
                <span class="side-button-label">Step</span>
              </button>
              <button class="side-button recording-toggle" type="button">
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <circle cx="8" cy="8" r="3.25" fill="currentColor"></circle>
                  </svg>
                </span>
                <span class="side-button-label">Record</span>
              </button>
              <button class="side-button recording-export" type="button" disabled>
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path
                      d="M8 2v6.2l2.2-2.2.8.8L8 10 5 6.8l.8-.8L8 8.2V2h1zM3 11h10v2H3z"
                      fill="currentColor"
                    ></path>
                  </svg>
                </span>
                <span class="side-button-label">Export Recording</span>
              </button>
              <button class="side-button simulation-reset" type="button">
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path
                      d="M8 3a5 5 0 1 1-4.5 2.8l1 .5A3.9 3.9 0 1 0 8 4.1H5.8L7.9 6 7 6.8 3.3 4 7 .2l.9.8L5.8 3H8z"
                      fill="currentColor"
                    ></path>
                  </svg>
                </span>
                <span class="side-button-label">Reset Simulation</span>
              </button>
              <button class="side-button view-reset" type="button">
                <span class="side-button-icon" aria-hidden="true">
                  <svg viewBox="0 0 16 16" focusable="false">
                    <path
                      d="M7.5 1h1v3.5H12v1H8.5V9h-1V5.5H4v-1h3.5zM3 11.5h2v1H3v-1zm8 0h2v1h-2v-1zM7.5 11.5h1v1h-1v-1z"
                      fill="currentColor"
                    ></path>
                    <path
                      d="M8 14a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-1A5 5 0 1 0 8 3a5 5 0 0 0 0 10z"
                      fill="currentColor"
                    ></path>
                  </svg>
                </span>
                <span class="side-button-label">Reset View</span>
              </button>
              <label class="side-field">
                <span class="side-field-label">Recording Name</span>
                <input
                  class="side-number recording-name-input"
                  type="text"
                  placeholder="Optional"
                >
              </label>
              <div class="recording-status"></div>
              <label class="side-field">
                <span class="side-field-label">Grid Width</span>
                <input
                  class="side-number grid-width-input"
                  type="number"
                  min="32"
                  max="1024"
                  step="32"
                  value="128"
                >
              </label>
              <label class="side-field">
                <span class="side-field-label">Grid Height</span>
                <input
                  class="side-number grid-height-input"
                  type="number"
                  min="32"
                  max="1024"
                  step="32"
                  value="128"
                >
              </label>
              <label class="side-field">
                <span class="side-field-label">Visualize</span>
                <select class="side-select visualization-mode">
                  <option value="speed">Velocity</option>
                  <option value="density">Density</option>
                  <option value="debug">Type / Fill</option>
                </select>
              </label>
              <label class="side-field">
                <span class="side-field-label">Tau</span>
                <input
                  class="side-range tau-slider"
                  type="range"
                  min="0.5"
                  max="2.0"
                  step="0.01"
                  value="0.9"
                >
                <span class="side-field-value tau-value">0.90</span>
              </label>
              <label class="side-field">
                <span class="side-field-label">Gravity</span>
                <input
                  class="side-range gravity-slider"
                  type="range"
                  min="0"
                  max="0.002"
                  step="0.00001"
                  value="0.0002"
                >
                <span class="side-field-value gravity-value">0.00020</span>
              </label>
              <label class="side-field">
                <span class="side-field-label">Rotation</span>
                <input
                  class="side-range rotation-slider"
                  type="range"
                  min="-180"
                  max="180"
                  step="1"
                  value="0"
                >
                <span class="side-field-value rotation-value">0°</span>
              </label>
              <label class="side-checkbox">
                <input class="chunk-grid-toggle" type="checkbox">
                <span>Show Chunk Grid</span>
              </label>
              <label class="side-checkbox">
                <input class="interpolation-toggle" type="checkbox">
                <span>Interpolate Render</span>
              </label>
              <label class="side-checkbox">
                <input class="hashing-toggle" type="checkbox">
                <span>Enable Hashing</span>
              </label>
            </div>
          </div>
        </aside>
        <section class="content-panel">
          <div class="workspace-view" aria-label="Main workspace">
            <div class="canvas-stage">
              <canvas class="main-canvas" aria-label="Main render surface"></canvas>
            </div>
          </div>
          <section class="inspector-panel is-collapsed" aria-label="Inspector panel">
            <button
              class="inspector-bar"
              type="button"
              aria-label="Resize inspector panel"
            >
              <span class="inspector-title">Inspector</span>
            </button>
            <div class="inspector-body"></div>
          </section>
        </section>
      </main>
    </div>
    <script type="module" src="./src/app.ts"></script>
  </body>
</html>
